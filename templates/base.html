<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Aurelia{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
            <img src="/static/img/favicon.svg" width="26" height="26" alt="Aurelia">
            Aurelia
        </a>
        <div class="d-flex align-items-center gap-2">
            <a href="/bookmarklet" class="btn btn-outline-light btn-sm">
                <i class="bi bi-bookmark-plus me-1"></i>ブックマークレット
            </a>
            <form class="d-flex" id="global-search-form">
                <div class="input-group">
                    <input class="form-control form-control-sm" type="search" id="global-search"
                           placeholder="論文を検索..." style="min-width:200px">
                    <button class="btn btn-outline-light btn-sm" type="submit">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</nav>

<div id="search-results-overlay" class="search-overlay d-none">
    <div class="container mt-2">
        <div class="card shadow">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>検索結果</span>
                <button class="btn btn-sm btn-outline-secondary" onclick="closeSearch()">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            <div class="card-body p-0" id="search-results-body" style="max-height:60vh;overflow-y:auto"></div>
        </div>
    </div>
</div>

<div class="container-fluid py-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/main.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>

<!-- ヘッダー -->
<div class="header">
    <img src="icon48.png" width="22" height="22" alt="Aurelia" style="border-radius:4px">
    <span class="header-title">Aurelia に追加</span>
</div>

<div class="content">

    <!-- 状態メッセージ -->
    <div id="status" class="status loading">
        <span class="spinner"></span> 論文情報を取得中...
    </div>

    <!-- フォーム -->
    <div id="form-area" class="hidden">
        <div class="field">
            <label>タイトル <span class="required">*</span></label>
            <input type="text" id="p-title">
        </div>
        <div class="field">
            <label>著者</label>
            <input type="text" id="p-authors">
        </div>
        <div class="row">
            <div class="field" style="flex:2">
                <label>掲載誌 / 会議</label>
                <input type="text" id="p-venue">
            </div>
            <div class="field" style="flex:1">
                <label>年</label>
                <input type="number" id="p-year">
            </div>
        </div>
        <div class="field">
            <label>概要</label>
            <textarea id="p-abstract" rows="3"></textarea>
        </div>
        <div class="field">
            <label>プロジェクト <span class="required">*</span></label>
            <select id="p-project">
                <option value="">-- 選択してください --</option>
            </select>
        </div>

        <button id="add-btn">
            ＋ 追加する
        </button>
    </div>

    <!-- サーバー未起動エラー -->
    <div id="server-error" class="hidden">
        <div class="error-box">
            <p>⚠️ Aurelia サーバーに接続できません</p>
            <p class="small">ターミナルで以下を実行してください：</p>
            <code>python3 app.py</code>
        </div>
    </div>

    <!-- 完了 -->
    <div id="done-area" class="hidden text-center">
        <div class="done-icon">✅</div>
        <p class="done-title" id="done-title"></p>
        <p class="small gray">プロジェクトに追加しました</p>
        <button class="btn-secondary" id="close-btn">閉じる</button>
    </div>

</div>

<script src="popup.js"></script>
</body>
</html>

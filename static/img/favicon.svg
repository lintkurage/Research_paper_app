<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bellGrad" cx="42%" cy="38%" r="62%">
      <stop offset="0%"   stop-color="#f3e8ff"/>
      <stop offset="35%"  stop-color="#d8a4ff"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.75"/>
    </radialGradient>
    <!-- 背景：パステル水色 -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#e0f4ff"/>
      <stop offset="100%" stop-color="#b8e4f5"/>
